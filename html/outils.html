<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outils L'ImprOse</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./asset/css/style.css">
</head>

<body>

<main class="container mt-4">

    <section>

        <h1>🎲 Outils L'ImprOse</h1>

        <p>
            Générez des thèmes et des catégories pour vos improvisations.
        </p>

        <hr>

        <h2>🎲 Générateur de thème</h2>

        <button class="btn btn-primary" onclick="genererTheme()">
            Générer un thème
        </button>

        <p id="theme" class="mt-3">
            Cliquez sur le bouton.
        </p>

        <hr>

        <h2>🎭 Générateur de catégorie</h2>

        <button class="btn btn-warning" onclick="genererCategorie()">
            Générer une catégorie
        </button>

        <p id="categorie" class="mt-3">
            Cliquez sur le bouton.
        </p>
    <h2>🏒 Tirage complet</h2>

<button class="btn btn-success" onclick="genererImpro()">
    Générer une improvisation
</button>

<div id="impro" class="mt-3">
    Cliquez sur le bouton.
</div>    

    </section>

</main>

<script src="./asset/js/script.js"></script>

</body>
</html>
